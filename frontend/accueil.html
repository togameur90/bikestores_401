        .swagger-ui table thead tr th,
        .swagger-ui table tbody tr td {

        ::-webkit-scrollbar {

        }

        ::-webkit-scrollbar-track {

        ::-webkit-scrollbar-thumb {

<body>

    <div id="site-navbar"></div>
    <script src="js/navbar.js"></script>


    <div class="api-banner">
        <div class="api-banner-logo">🚲</div>
        <div class="api-banner-text">
            <h1>Bike Stores – Web Service API</h1>
            <p>RESTful JSON API for managing stores, products, brands, categories, employees and stock.</p>
            <p style="font-size: 0.8rem; color: #8a96b0; margin-top: 6px;">
                <em>This documentation was designed with <a href="https://swagger.io/" target="_blank"
                        style="color: #5b9bd5; text-decoration: none;">Swagger</a> and <a
                        href="https://editor.swagger.io" target="_blank"
                        style="color: #5b9bd5; text-decoration: none;">its online editor</a>. It is written in
                    English.</em>
            </p>
        </div>
        <div class="api-banner-badges">
            <span class="badge badge-version">v1.0</span>
            <span class="badge badge-rest">REST</span>
            <span class="badge badge-json">JSON</span>
        </div>
    </div>


    <div id="swagger-ui"></div>


    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>

    <script>

        const spec = {
            "openapi": "3.0.3",
            "info": {
                "title": "Bike Stores REST API",
                "version": "1.0.0",
                "description": "## Overview\nThis web service provides **CRUD** access to the Bike Stores database over HTTP using **JSON**.\n\nThis documentation was designed using the [Swagger](https://swagger.io/) tool and its online editor at [editor.swagger.io](https://editor.swagger.io). It is written in English.\n\n## Base URL\n`https://dev-marcher241.users.info.unicaen.fr/bikestores/public`\n\n## Authentication\nAll **write operations** (POST, PUT, DELETE) require an API key passed as a query parameter:\n`?api_key=e8f1997c763`\n\nRead operations (GET) are public.\n**Exception**: `POST /employees/login` is public."
            },
            "servers": [
                {
                    "url": "https://dev-marcher241.users.info.unicaen.fr/bikestores/public",
                    "description": "Local development server"
                }
            ],
            "paths": {
                "/stores": {
                    "get": {
                        "summary": "List all stores",
                        "responses": {
                            "200": {
                                "description": "A list of stores"
                            }
                        }
                    },
                    "post": {
                        "summary": "Create a store",
                        "parameters": [
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": {
                                        "$ref": "#/components/schemas/Store"
                                    }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Store created"
                            }
                        }
                    }
                },
                "/stores/{id}": {
                    "get": {
                        "summary": "Get store by ID",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Store returned"
                            }
                        }
                    },
                    "put": {
                        "summary": "Update a store",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            },
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": {
                                        "$ref": "#/components/schemas/Store"
                                    }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Store updated"
                            }
                        }
                    },
                    "delete": {
                        "summary": "Delete a store",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            },
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Store deleted"
                            }
                        }
                    }
                },
                "/products": {
                    "get": {
                        "summary": "List all products",
                        "responses": {
                            "200": {
                                "description": "A list of products"
                            }
                        }
                    },
                    "post": {
                        "summary": "Create a product",
                        "parameters": [
                            {
                                "in": "query",
                                "name": "action",
                                "required": true,
                                "schema": {
                                    "type": "string",
                                    "enum": [
                                        "addProduct"
                                    ]
                                }
                            },
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": {
                                        "$ref": "#/components/schemas/ProductInput"
                                    }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Product created"
                            }
                        }
                    }
                },
                "/products/{id}": {
                    "get": {
                        "summary": "Get product by ID",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Product returned"
                            }
                        }
                    },
                    "put": {
                        "summary": "Update a product",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            },
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": {
                                        "$ref": "#/components/schemas/ProductInput"
                                    }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Product updated"
                            }
                        }
                    },
                    "delete": {
                        "summary": "Delete a product",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            },
                            {
                                "in": "query",
                                "name": "api_key",
                                "required": true,
                                "schema": {
                                    "type": "string"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Product deleted"
                            }
                        }
                    }
                },
                "/brands": {
                    "get": {
                        "summary": "List all brands",
                        "responses": {
                            "200": {
                                "description": "A list of brands"
                            }
                        }
                    }
                },
                "/categories": {
                    "get": {
                        "summary": "List all categories",
                        "responses": {
                            "200": {
                                "description": "A list of categories"
                            }
                        }
                    }
                },
                "/employees": {
                    "get": {
                        "summary": "List all employees",
                        "responses": {
                            "200": {
                                "description": "A list of employees"
                            }
                        }
                    }
                },
                "/employees/login": {
                    "post": {
                        "summary": "Login an employee",
                        "requestBody": {
                            "required": true,
                            "content": {
                                "application/json": {
                                    "schema": {
                                        "type": "object",
                                        "properties": {
                                            "email": {
                                                "type": "string"
                                            },
                                            "password": {
                                                "type": "string"
                                            }
                                        }
                                    }
                                }
                            }
                        },
                        "responses": {
                            "200": {
                                "description": "Login successful"
                            }
                        }
                    }
                },
                "/stocks/{store_id}": {
                    "get": {
                        "summary": "List stock for a store",
                        "parameters": [
                            {
                                "in": "path",
                                "name": "store_id",
                                "required": true,
                                "schema": {
                                    "type": "integer"
                                }
                            }
                        ],
                        "responses": {
                            "200": {
                                "description": "Stock list"
                            }
                        }
                    }
                }
            },
            "components": {
                "schemas": {
                    "Store": {
                        "type": "object",
                        "properties": {
                            "store_name": {
                                "type": "string"
                            },
                            "phone": {
                                "type": "string"
                            },
                            "email": {
                                "type": "string"
                            },
                            "street": {
                                "type": "string"
                            },
                            "city": {
                                "type": "string"
                            },
                            "state": {
                                "type": "string"
                            },
                            "zip_code": {
                                "type": "string"
                            }
                        }
                    },
                    "ProductInput": {
                        "type": "object",
                        "properties": {
                            "product_name": {
                                "type": "string"
                            },
                            "list_price": {
                                "type": "number"
                            },
                            "model_year": {
                                "type": "integer"
                            },
                            "brand_id": {
                                "type": "integer"
                            },
                            "category_id": {
                                "type": "integer"
                            }
                        }
                    }
                }
            }
        };

        window.onload = () => {
            SwaggerUIBundle({
                spec: spec,
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                displayRequestDuration: true,
                filter: true,
                tryItOutEnabled: true
            });
        };</script>

</body>
