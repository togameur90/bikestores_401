<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Stores – Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
        }

        .table-dark {
            background-color: #212529;
        }

        .card .table-responsive {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div id="site-navbar"></div>
    <script src="js/navbar.js"></script>

    <main class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1" id="page-title">👥 Employee Management</h1>
                <p class="text-secondary mb-0" id="page-subtitle">Loading...</p>
            </div>
            <button class="btn btn-success rounded-pill px-4" onclick="openAddEmployeeModal()">+ Add</button>
        </div>

        <div id="page-alert" class="alert d-none" role="alert"></div>

        <div id="employees-container">
            <p class="text-secondary text-center py-4">Loading employees...</p>
        </div>

    </main>

    <div class="modal fade" id="employeeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-secondary">
                <form id="form-employee">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title" id="modal-title">Add an employee</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="emp-id">

                        <div class="mb-3">
                            <label class="form-label">Full name <span class="text-danger">*</span></label>
                            <input type="text" id="emp-name" class="form-control bg-dark text-white border-secondary"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" id="emp-email" class="form-control bg-dark text-white border-secondary"
                                required>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label">Role <span class="text-danger">*</span></label>
                                <select id="emp-role" class="form-select bg-dark text-white border-secondary" required
                                    disabled>
                                    <option value="employee" selected>Standard Employee</option>
                                    <option value="chief">Manager (Chief)</option>
                                </select>
                                <div id="role-help" class="form-text text-secondary small d-none">Only the IT admin can
                                    edit the role.</div>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Store <span class="text-danger">*</span></label>
                                <select id="emp-store" class="form-select bg-dark text-white border-secondary" required>
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="btn-save-emp">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://dev-marcher241.users.info.unicaen.fr/bikestores/public';
        const API_KEY = 'e8f1997c763';


        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (!user || !user.employee_role) window.location.href = 'index.html';

        const role = user.employee_role.toLowerCase();
        const isIT = role === 'it';
        const isChief = role === 'chief';

        if (!isIT && !isChief) {
            alert("Access denied. Reserved for managers and IT.");
            window.location.href = 'accueil.html';
        }

        let allEmployees = [];


        document.addEventListener('DOMContentLoaded', () => {
            if (isIT) {
                document.getElementById('page-title').textContent = "All Employees";
                document.getElementById('page-subtitle').textContent = "Manage employees across all stores";
                document.querySelectorAll('.it-only').forEach(el => el.classList.remove('d-none'));
            } else {
                document.getElementById('page-title').textContent = "My Store Employees";
                document.getElementById('page-subtitle').innerHTML = `Store: <strong class="text-white">${user.store_name}</strong>`;
            }

            loadStoresDropdown();
            loadEmployees();
        });

        function showAlert(type, message) {
            const box = document.getElementById('page-alert');
            box.className = `alert alert-${type} mb-4`;
            box.textContent = message;
            box.classList.remove('d-none');
            setTimeout(() => { box.classList.add('d-none'); }, 4000);
        }


        async function loadEmployees() {
            const container = document.getElementById('employees-container');
            try {
                const url = isIT
                    ? `${API_URL}/API.php?action=getAllEmployees`
                    : `${API_URL}/API.php?action=getEmployeesByStore&store_id=${user.store_id}`;

                const response = await fetch(url);
                allEmployees = await response.json();

                if (allEmployees.error || allEmployees.length === 0) {
                    return container.innerHTML = `<div class="alert alert-warning text-center">No employees found.</div>`;
                }

                container.innerHTML = '';

                if (isIT) {
                    const groupedByStore = allEmployees.reduce((acc, emp) => {
                        const storeName = emp.store_name || `Unknown store (ID: ${emp.store_id})`;
                        if (!acc[storeName]) acc[storeName] = [];
                        acc[storeName].push(emp);
                        return acc;
                    }, {});

                    for (const [storeName, employees] of Object.entries(groupedByStore)) {
                        container.innerHTML += `<h4 class="text-white mt-4 mb-3">📍 ${storeName}</h4>`;
                        container.innerHTML += generateTableHtml(employees);
                    }
                } else {
                    container.innerHTML = generateTableHtml(allEmployees);
                }

            } catch (err) { container.innerHTML = `<div class="alert alert-danger text-center">API connection error.</div>`; }
        }


        function generateTableHtml(employeesList) {
            let html = `
                <div class="card bg-dark border-secondary shadow-sm mb-4">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover align-middle border-secondary mb-0 m-0">
                                <thead>
                                    <tr>
                                        <th class="text-secondary ps-4 py-3">ID</th>
                                        <th class="text-secondary py-3">Full name</th>
                                        <th class="text-secondary py-3">Email</th>
                                        <th class="text-secondary py-3">Role</th>
                                        <th class="text-end text-secondary pe-4 py-3">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;

            employeesList.forEach(emp => {
                let roleBadge = emp.employee_role === 'it' ? 'bg-danger' : (emp.employee_role === 'chief' ? 'bg-warning text-dark' : 'bg-secondary');

                let editBtn = isIT ? `<button onclick="openEditEmployee(${emp.employee_id})" class="btn btn-sm btn-outline-light rounded-pill px-3">Edit</button>` : '';

                html += `
                    <tr>
                        <td class="text-secondary ps-4">#${emp.employee_id}</td>
                        <td class="fw-bold text-white">${emp.employee_name}</td>
                        <td>${emp.employee_email}</td>
                        <td><span class="badge ${roleBadge}">${emp.employee_role}</span></td>
                        <td class="text-end pe-4">
                            ${editBtn}
                            <button onclick="deleteEmployee(${emp.employee_id})" class="btn btn-sm btn-outline-danger rounded-pill px-3 ms-1">Delete</button>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div></div></div>`;
            return html;
        }

        async function loadStoresDropdown() {
            try {
                const res = await fetch(`${API_URL}/API.php?action=getStores`);
                const stores = await res.json();
                const select = document.getElementById('emp-store');
                select.innerHTML = stores.map(s => `<option value="${s.store_id}">${s.store_name}</option>`).join('');

                if (isChief) {
                    select.value = user.store_id;
                    select.disabled = true;
                }
            } catch (err) { console.error("Erreur chargement magasins"); }
        }


        function openAddEmployeeModal() {
            document.getElementById('form-employee').reset();
            document.getElementById('emp-id').value = '';
            document.getElementById('modal-title').textContent = "Add an employee";

            const roleSelect = document.getElementById('emp-role');
            const storeSelect = document.getElementById('emp-store');

            if (isIT) {
                roleSelect.disabled = false;
                storeSelect.disabled = false;
            } else {
                roleSelect.value = "employee";
                roleSelect.disabled = true;
                storeSelect.value = user.store_id;
                storeSelect.disabled = true;
            }

            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }


        function openEditEmployee(id) {
            if (!isIT) return;

            const emp = allEmployees.find(e => e.employee_id == id);
            if (!emp) return;

            document.getElementById('emp-id').value = emp.employee_id;
            document.getElementById('emp-name').value = emp.employee_name;
            document.getElementById('emp-email').value = emp.employee_email;

            const roleSelect = document.getElementById('emp-role');
            const storeSelect = document.getElementById('emp-store');

            roleSelect.value = emp.employee_role;
            roleSelect.disabled = false;

            storeSelect.value = emp.store_id;
            storeSelect.disabled = false;

            document.getElementById('modal-title').textContent = "Edit employee";
            new bootstrap.Modal(document.getElementById('employeeModal')).show();
        }


        document.getElementById('form-employee').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('emp-id').value;
            const isUpdate = id !== '';


            const body = {
                employee_name: document.getElementById('emp-name').value,
                employee_email: document.getElementById('emp-email').value,
                employee_role: document.getElementById('emp-role').value,
                store_id: document.getElementById('emp-store').value
            };

            const action = isUpdate ? `updateEmployee&id=${id}` : 'addEmployee';
            const method = isUpdate ? 'PUT' : 'POST';

            try {
                const res = await fetch(`${API_URL}/API.php?action=${action}&api_key=${API_KEY}`, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok && !data.error) {
                    showAlert('success', isUpdate ? 'Changes saved!' : 'New employee created!');
                    bootstrap.Modal.getInstance(document.getElementById('employeeModal')).hide();
                    loadEmployees();
                } else {
                    showAlert('danger', data.error || 'Error saving.');
                }
            } catch (err) { showAlert('danger', 'Server error.'); }
        });


        async function deleteEmployee(id) {
            if (id == user.employee_id) return alert("You cannot delete your own account!");
            if (!confirm("Are you sure you want to remove / delete this employee?")) return;

            try {
                const res = await fetch(`${API_URL}/API.php?action=deleteEmployee&id=${id}&api_key=${API_KEY}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok && !data.error) {
                    showAlert('success', 'Employee removed from the system.');
                    loadEmployees();
                } else showAlert('danger', data.error);
            } catch (err) { showAlert('danger', 'Network error.'); }
        }
    </script>
</body>

</html>
