<!DOCTYPE html>
<html lang="fr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Stores – Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>


    <div id="site-navbar"></div>
    <script src="js/navbar.js"></script>

    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card bg-dark border-secondary shadow p-4">

                    <h2 class="h5 fw-bold text-center mb-4">🔐 Employee Login</h2>

                    <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label small">Email address</label>
                            <input type="email" id="email" class="form-control form-control-sm"
                                placeholder="employee@bikestores.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label small">Password</label>
                            <input type="password" id="password" class="form-control form-control-sm" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill">Sign in</button>
                    </form>

                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://dev-marcher241.users.info.unicaen.fr/bikestores/public';

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('login-error');
            errorBox.classList.add('d-none');

            try {
                const resp = await fetch(`${API_URL}/employees/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await resp.json();

                if (resp.ok && data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'accueil.html';
                } else {
                    errorBox.textContent = data.error || 'Incorrect email or password.';
                    errorBox.classList.remove('d-none');
                }
            } catch (err) {
                errorBox.textContent = "Unable to reach the API.";
                errorBox.classList.remove('d-none');
            }
        });
    </script>

</body>

</html>
